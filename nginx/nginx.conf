user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Preserva o protocolo original (https/http) vindo do proxy (EasyPanel/Traefik)
    # e usa $scheme como fallback quando não houver header.
    map $http_x_forwarded_proto $effective_proto {
        default $scheme;
        ~*^https$ https;
        ~*^http$ http;
    }

    server_tokens off;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

    server {
        listen 80;
        server_name _;

        client_max_body_size 50m;

        # Auth endpoints — rate limit mais restrito
        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass         http://backend:80/auth/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $effective_proto;
        }

        # API geral
        location /api/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass         http://backend:80/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $effective_proto;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_request_buffering off;
        }

        # Frontend (SPA)
        location / {
            proxy_pass       http://frontend:80;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
        }
    }
}
